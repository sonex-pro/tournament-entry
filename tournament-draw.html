<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BATTS Senior 1-Star Tournament - Tournament Draw</title>
  <link rel="stylesheet" href="tournament-draw.css">
  <!-- Favicon links -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-images/favicon-16x16.png">
  <link rel="apple-touch-icon" href="favicon-images/apple-touch-icon.png">
  <link rel="icon" href="favicon-images/favicon-32x32.png">
  <meta name="theme-color" content="#ffffff">
</head>
<body>
  <div class="draw-container">
    <header class="draw-header">
      <h1>BATTS Senior 1-Star Tournament</h1>
      <h2>Tournament Draw</h2>
      <p class="draw-date">Sunday 19 April 2026</p>
    </header>

    <main class="draw-content">
      <div class="draw-notice">
        <p class="notice-text">The draw is provisional and can change if players withdraw.</p>
      </div>

      <div class="draw-image-container">
        <img src="images/draw-april-26.jpg" alt="Tournament Draw" class="draw-image">
      </div>
    </main>

    <footer class="draw-footer">
      <p>BATTS Table Tennis Club</p>
      <p>Norman Booth Centre, Elderfield, Mulberry Green, Old Harlow, Essex CM17 0EY</p>
    </footer>
  </div>
</body>
</html>
